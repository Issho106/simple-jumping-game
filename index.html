<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumping Game</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="./js/character.js" defer></script>
    <script src="./js/obstacle.js" defer></script>
    <script src="./js/game.js" defer></script>
  </head>

  <body>
    <main id="game-container">
      <img
        class="background-image"
        src="./assets/images/medievalbackground.jpg"
        alt="Medieval background"
      >

      <section id="landing-screen" class="screen">
        <h1>Jumping Game</h1>
        <h2>Press the spacebar to jump over obstacles!</h2>
        <button id="play-btn">Play</button>
      </section>

      <section id="select-screen" class="screen hidden">
        <p>Choose your character:</p>
        <div id="selections">
        <figure data-character="silver" class="selected">
          <img src="./assets/images/silver-knight.png" alt="silver-knight">
          <figcaption>
            <span class="character-name">Silver Knight</span>
            <span class="character-details">Standard jump height for classic gameplay.</span>
          </figcaption>
        </figure>
        <figure data-character="golden">
          <img src="./assets/images/golden-knight.png" alt="golden-knight">
          <figcaption>
            <span class="character-name">Golden Knight</span>
            <span class="character-details">Blessed by solar magic to jump twice as high.</span>
          </figcaption>
        </figure>
        </div>
        <button id="start-btn">Start</button>
      </section>

      <section id="game-screen" class="screen hidden">
        <header id="game-header">
          <h2>
            Score:
            <span id="score">0</span>
          </h2>
        </header>

        <div id="game-area">
          <div id="character"></div>

          <div id="obstacle-container">
            <div class="obstacle"></div>
          </div>

          <div id="ground">
            <img src="./assets/images/brick-ground.jpg" alt="Ground">
          </div>
        </div>
      </section>

      <section id="gameover-screen" class="screen hidden">
        <h1>Game Over</h1>
        <p>
          Final Score:
          <span id="final-score">0</span>
        </p>
        <button id="restart-btn">Play Again</button>
        <button id="change-btn">Change Knight</button>
      </section>
    </main>
  </body>
</html>
